lr0: 0.01                   # initial learning rate (SGD=2E-2, Adam=2E-3)
lrf: 0.10                   # final OneCycleLR learning rate (lr0 * lrf)
momentum: 0.9               # SGD momentum/Adam beta1
weight_decay: 0.0005        # optimizer weight decay 5e-4
warmup_epochs: 3.000        # warmup epochs
warmup_momentum: 0.8        # warmup initial momentum
warmup_bias_lr: 0.10        # warmup initial bias lr
hsv_h: 0.015                # image HSV-Hue augmentation (fraction)
hsv_s: 0.700                # image HSV-Saturation augmentation (fraction)
hsv_v: 0.400                # image HSV-Value augmentation (fraction)
mixup: 0.200                # image mix-up (probability)
